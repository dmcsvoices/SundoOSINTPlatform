<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>☀️ Sundo Pi — Network View</title>
  <link rel="icon" type="image/png" href="/static/favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    html, body { margin: 0; padding: 0; height: 100%; font-family: system-ui, sans-serif; background: #faf8f3; }
    #cy { width: 100%; height: 100%; display: block; }
    #info {
      position: absolute; top: 10px; left: 10px; background: rgba(245,240,230,0.96);
      padding: 12px 16px; border-radius: 12px; font-size: 13px; max-width: 280px;
      box-shadow: 0 2px 8px rgba(61,50,41,0.10); border: 1px solid #d4c5a9;
      z-index: 10; pointer-events: auto;
    }
    #info h1 { margin: 0 0 6px; font-size: 15px; color: #3d3229; }
    #info h1::before { content: "🌿 "; }
    #legend { margin-top: 8px; }
    .dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; }
    #reset-view-btn {
      margin-top: 8px;
      padding: 6px 12px;
      font-size: 12px;
      cursor: pointer;
      border-radius: 8px;
      border: 1px solid #d4c5a9;
      background: #faf5ed;
      color: #3d3229;
      font-weight: 500;
      width: 100%;
      box-sizing: border-box;
      transition: background 0.15s, border-color 0.15s;
    }
    #reset-view-btn:hover {
      background: #f0e8d8;
      border-color: #c4b499;
    }
    @media (prefers-color-scheme: dark) {
      #reset-view-btn { background: #2a3f2a; border-color: #4a5c3d; color: #e8dfd0; }
      #reset-view-btn:hover { background: #334a33; }
    }
    #layout-toggle {
      margin-top: 10px;
      font-size: 12px;
    }
    #layout-toggle label {
      display: block;
      margin: 2px 0;
      cursor: pointer;
    }
    #layout-toggle input {
      margin-right: 6px;
    }
    #loading {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      font-size: 16px; color: #4a7c59; animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }
    #search-container {
      position: relative;
      margin: 8px 0;
      padding: 8px 0;
      border-top: 1px solid #d4c5a9;
    }
    #search-input {
      width: 100%;
      padding: 6px 10px;
      border: 1px solid #d4c5a9;
      border-radius: 8px;
      font-size: 12px;
      background: #faf5ed;
      color: #3d3229;
      box-sizing: border-box;
    }
    #search-input:focus {
      outline: none;
      border-color: #4a7c59;
    }
    #search-dropdown {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: rgba(245,240,230,0.98);
      border: 1px solid #d4c5a9;
      border-radius: 8px;
      box-shadow: 0 4px 12px rgba(61,50,41,0.12);
      max-height: 280px;
      overflow-y: auto;
      z-index: 1000;
      display: none;
      margin-top: 4px;
    }
    #search-dropdown.active {
      display: block;
    }
    .search-result {
      padding: 8px 12px;
      cursor: pointer;
      border-bottom: 1px solid rgba(212,197,169,0.4);
      font-size: 12px;
    }
    .search-result:last-child {
      border-bottom: none;
    }
    .search-result:hover,
    .search-result.selected {
      background: rgba(74,124,89,0.08);
    }
    .search-result-title {
      font-weight: 500;
      color: #3d3229;
      line-height: 1.3;
    }
    .search-result-subtitle {
      font-size: 11px;
      color: #8c7b6b;
      margin-top: 2px;
    }
    .search-result-type {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 6px;
      font-size: 10px;
      font-weight: 600;
      margin-right: 6px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .search-type-article { background: #e8e0d4; color: #6b5e4f; }
    .search-type-author { background: #e0f0e0; color: #3d7c3d; }
    .search-type-source { background: #e0ecf7; color: #2e6b9e; }
    .search-no-results {
      padding: 12px;
      font-size: 12px;
      color: #8c7b6b;
      text-align: center;
    }
    @media (prefers-color-scheme: dark) {
      #search-input { background: #2a3f2a; border-color: #4a5c3d; color: #e8dfd0; }
      #search-dropdown { background: rgba(40,55,40,0.98); border-color: #3d5c3d; }
      .search-result { border-bottom-color: #2a3f2a; }
      .search-result:hover,
      .search-result.selected { background: rgba(74,124,89,0.15); }
      .search-result-title { color: #e8dfd0; }
      .search-result-subtitle { color: #a09080; }
    }
    /* Side panel */
    #detail-panel {
      position: fixed; top: 0; right: -420px; width: 400px; height: 100vh;
      background: #f5f0e6; border-left: 1px solid #d4c5a9; box-shadow: -4px 0 16px rgba(61,50,41,0.08);
      transition: right 0.25s ease; overflow-y: auto; z-index: 1000;
      padding: 20px; box-sizing: border-box; font-family: system-ui, sans-serif; font-size: 13px; color: #3d3229;
      border-top-left-radius: 12px; border-bottom-left-radius: 12px;
    }
    #detail-panel.panel-open { right: 0; }
    #panel-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid #d4c5a9;
    }
    #panel-title { font-size: 15px; font-weight: 600; color: #3d3229; }
    #panel-close { background: none; border: none; font-size: 18px; cursor: pointer; color: #8c7b6b; line-height: 1; }
    #panel-close:hover { color: #4a7c59; }
    .panel-section { margin-bottom: 20px; }
    .panel-section-title {
      font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em;
      color: #8c7b6b; margin-bottom: 8px;
    }
    .panel-row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid rgba(212,197,169,0.4); }
    .panel-row-label { color: #8c7b6b; }
    .panel-row-value { font-weight: 500; text-align: right; max-width: 60%; word-break: break-word; color: #3d3229; }
    .score-bar { height: 8px; background: #e8e0d4; border-radius: 4px; margin-top: 4px; }
    .score-bar-fill { height: 100%; border-radius: 4px; background: #f4a261; }
    .score-bar-fill.green { background: #7cb342; }
    .badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; }
    .badge-red { background: #fce8e8; color: #c94c4c; }
    .badge-orange { background: #fff4e0; color: #b86d1a; }
    .badge-green { background: #e8f5d6; color: #4e7e28; }
    .badge-blue { background: #e0ecf7; color: #2e6b9e; }
    .badge-gray { background: #ede8de; color: #6b5e4f; }
    .article-item { padding: 8px 0; border-bottom: 1px solid rgba(212,197,169,0.4); line-height: 1.4; }
    .article-item a { color: #2e6b9e; text-decoration: none; font-weight: 500; }
    .article-item a:hover { text-decoration: underline; color: #4a7c59; }
    .article-meta { font-size: 11px; color: #8c7b6b; margin-top: 2px; }
    .action-btn {
      display: inline-block; padding: 6px 12px; border-radius: 8px; border: 1px solid #d4c5a9;
      background: #faf5ed; cursor: pointer; font-size: 12px; font-weight: 500;
      margin-right: 8px; margin-top: 4px; text-decoration: none; color: #3d3229;
    }
    .action-btn:hover { background: #f0e8d8; border-color: #c4b499; }
    .action-btn.primary { background: #4a7c59; color: #fff; border-color: #4a7c59; }
    .action-btn.primary:hover { background: #5a9c6b; border-color: #5a9c6b; }
    .loading-state { color: #8c7b6b; font-size: 13px; padding: 20px 0; text-align: center; }
    .count-badge { font-size: 11px; color: #8c7b6b; margin-left: 4px; font-weight: 500; }
    @media (prefers-color-scheme: dark) {
      .count-badge { color: #a09080; }
      html, body { background: #1a2f1a; }
      #info { background: rgba(40,55,40,0.96); border-color: #3d5c3d; color: #e8dfd0; }
      #info h1 { color: #e8dfd0; }
      #detail-panel { background: #1e331e; border-left-color: #3d5c3d; color: #e8dfd0; }
      #panel-header { border-bottom-color: #3d5c3d; }
      #panel-title { color: #e8dfd0; }
      #panel-close { color: #a09080; }
      #panel-close:hover { color: #7cb342; }
      .panel-row { border-bottom-color: #2a3f2a; }
      .panel-row-label { color: #a09080; }
      .panel-row-value { color: #e8dfd0; }
      .article-item { border-bottom-color: #2a3f2a; }
      .action-btn { background: #2a3f2a; border-color: #4a5c3d; color: #e8dfd0; }
      .action-btn:hover { background: #334a33; }
      .score-bar { background: #334a33; }
      .loading-state { color: #a09080; }
    }
  </style>
</head>
<body>
  <div id="info">
    <h1>Sundo Pi Network</h1>
    <div style="text-align: right; margin-bottom: 6px;">
      <a href="/logout" style="font-size: 12px; color: #8c7b6b; text-decoration: none;">🚪 Log out</a>
    </div>
    <div id="search-container">
      <input type="text" id="search-input" placeholder="Search nodes…" autocomplete="off">
      <div id="search-dropdown"></div>
    </div>
    <div id="hover">Hover a node for details.</div>
    <div id="filter-controls" style="margin: 8px 0; padding: 8px 0; border-top: 1px solid #d4c5a9; position: relative; z-index: 100;">
      <div style="font-weight: bold; margin-bottom: 4px; font-size: 12px;">Filters</div>
      <div style="margin-bottom: 6px;">
        <label style="font-size: 11px; color: #5a4d3f;">📅 Date:</label>
        <select id="filter-date" style="width: 100%; font-size: 11px; padding: 2px; border: 1px solid #d4c5a9; border-radius: 4px; background: #faf5ed;">
          <option value="all">All time</option>
          <option value="7">Last 7 days</option>
          <option value="30">Last 30 days</option>
          <option value="90">Last 90 days</option>
        </select>
      </div>
      <div style="margin-bottom: 6px;">
        <label style="font-size: 11px; color: #5a4d3f;">📰 Source:</label>
        <select id="filter-source" style="width: 100%; font-size: 11px; padding: 2px; border: 1px solid #d4c5a9; border-radius: 4px; background: #faf5ed;">
          <option value="all">All sources</option>
          <option value="972mag">+972 Magazine</option>
          <option value="alquds">Al-Quds</option>
          <option value="mondoweiss">Mondoweiss</option>
          <option value="palestinechronicle">Palestine Chronicle</option>
          <option value="imeu">IMEU</option>
          <option value="ei">Electronic Intifada</option>
          <option value="btselem">B'Tselem</option>
          <option value="palestinepost">Palestine Post</option>
        </select>
      </div>
      <div style="margin-bottom: 6px;">
        <label style="font-size: 11px; color: #5a4d3f;">🏷️ Tag:</label>
        <input type="text" id="filter-tag" placeholder="Search tags..." style="width: 100%; font-size: 11px; padding: 2px 4px; border: 1px solid #d4c5a9; border-radius: 4px; background: #faf5ed; box-sizing: border-box;">
      </div>
      <div style="display: flex; gap: 4px;">
        <button id="apply-filters" style="flex: 1; font-size: 11px; padding: 4px; background: #0ca678; color: white; border: none; border-radius: 4px; cursor: pointer;">Apply</button>
        <button id="clear-filters" style="flex: 1; font-size: 11px; padding: 4px; background: #a89b8c; color: white; border: none; border-radius: 4px; cursor: pointer;">Clear</button>
      </div>
      <hr style="border: none; border-top: 1px solid #d4c5a9; margin: 8px 0;">
      <label style="display: flex; align-items: center; cursor: pointer; font-size: 12px;">
        <input type="checkbox" id="show-articles" style="margin-right: 6px; cursor: pointer;">
        Show Articles
      </label>
      <label style="display: flex; align-items: center; cursor: pointer; font-size: 12px; margin-top: 4px;">
        <input type="checkbox" id="toggle-authors" style="margin-right: 6px; cursor: pointer;" checked>
        Show Authors
      </label>
    </div>
    <div id="layout-toggle" style="margin: 8px 0; padding: 8px 0; border-top: 1px solid #d4c5a9;">
      <div style="font-weight: bold; margin-bottom: 4px; font-size: 12px;">Layout</div>
      <label><input type="radio" name="layout" value="concentric"> Concentric (hub-spoke)</label>
      <label><input type="radio" name="layout" value="cose" checked> Cose (organic)</label>
      <label><input type="radio" name="layout" value="circle"> Circle</label>
      <label><input type="radio" name="layout" value="grid"> Grid</label>
      <label><input type="radio" name="layout" value="breadthfirst"> Tree</label>
      <label><input type="radio" name="layout" value="random"> Random</label>
    </div>
    <div id="legend">
      <div><span class="dot" style="background:#c94c4c"></span>Person (FARA-linked) <span id="count-person-fara" class="count-badge"></span></div>
      <div><span class="dot" style="background:#d4a017"></span>Person (unlinked) <span id="count-person" class="count-badge"></span></div>
      <div><span class="dot" style="background:#3d8c9e"></span>Organization <span id="count-org" class="count-badge"></span></div>
      <div><span class="dot" style="background:#7cb342"></span>PalestinianVoice <span id="count-voice" class="count-badge"></span></div>
      <div><span class="dot" style="background:#a89b8c"></span>Article <span id="count-article" class="count-badge"></span></div>
      <div><span class="dot" style="background:#0ca678"></span>Author <span id="count-author" class="count-badge"></span></div>
      <div><span class="dot" style="background:#e8590c"></span>Source <span id="count-source" class="count-badge"></span></div>
    </div>
    <button id="reset-view-btn" title="Reset view (R)">⟲ Reset view</button>
  </div>
  <div id="loading">Loading graph...</div>
  <div id="cy"></div>
  <div id="detail-panel" class="panel-closed">
    <div id="panel-header">
      <span id="panel-title"></span>
      <button id="panel-close" onclick="closePanel()">✕</button>
    </div>
    <div id="panel-body"></div>
  </div>

  <script type="application/json" id="graph-data">
    {{ graph_json | safe }}
  </script>

  <script src="https://unpkg.com/cytoscape@3.26.0/dist/cytoscape.min.js"></script>
  <script>
    try {
      console.log('Sundo: starting graph init...');
      const graph = JSON.parse(document.getElementById('graph-data').textContent);
      console.log('Sundo: parsed', graph.nodes.length, 'nodes,', graph.edges.length, 'edges');

      function nodeColor(n) {
        const t = n.data.type || 'Unknown';
        const fara = n.data.fara_linked;
        if (t === 'Person' && fara) return '#c94c4c';
        if (t === 'Person') return '#d4a017';
        if (t === 'Organization') return '#3d8c9e';
        if (t === 'PalestinianVoice') return '#7cb342';
        if (t === 'Author') return '#0ca678';
        if (t === 'Source') return '#e8590c';
        return '#a89b8c';
      }

      graph.nodes.forEach(function(n) {
        n.data.color = nodeColor(n);
      });

      document.getElementById('loading').style.display = 'none';
      console.log('Sundo: loading hidden');

      if (typeof cytoscape === 'undefined') {
        throw new Error('Cytoscape library failed to load from CDN');
      }
      console.log('Sundo: cytoscape loaded');

      const cy = cytoscape({
        container: document.getElementById('cy'),
        elements: [
          ...graph.nodes.map(function(n) {
            const el = { data: n.data };
            if (n.data.type === 'Article') el.classes = 'article';
            return el;
          }),
          ...graph.edges.map(function(e) {
            const el = { data: e.data };
            if (e.data.relationship === 'PUBLISHED') el.classes = 'article-edge';
            return el;
          })
        ],
        style: [
          { selector: 'node', style: {
            'background-color': 'data(color)',
            'label': 'data(label)',
            'width': 22,
            'height': 22,
            'font-size': 11,
            'text-valign': 'bottom',
            'text-margin-y': 6,
            'color': '#3d3229',
            'text-background-color': '#faf8f3',
            'text-background-opacity': 0.85,
            'text-background-padding': 2,
            'border-width': 2,
            'border-color': '#6b5e4f'
          }},
          { selector: 'edge', style: {
            'width': 2,
            'line-color': '#c4b499',
            'target-arrow-color': '#c4b499',
            'target-arrow-shape': 'triangle',
            'curve-style': 'bezier',
            'label': 'data(relationship)',
            'font-size': 9,
            'color': '#8c7b6b',
            'text-background-color': '#faf8f3',
            'text-background-opacity': 0.8
          }},
          { selector: "node[type = 'Author']", style: {
            'background-color': '#0ca678',
            'label': 'data(label)',
            'width': 'data(size)',
            'height': 'data(size)',
            'font-size': '10px',
            'text-valign': 'bottom',
            'text-margin-y': '4px',
            'color': '#333',
            'text-outline-width': 0,
          }},
          { selector: "edge[relationship = 'WROTE']", style: {
            'width': 1,
            'line-color': '#0ca678',
            'line-style': 'dashed',
            'target-arrow-color': '#0ca678',
            'target-arrow-shape': 'triangle',
            'opacity': 0.5,
          }},
          { selector: "edge[relationship = 'WRITES_FOR']", style: {
            'width': 2,
            'line-color': '#0ca678',
            'target-arrow-color': '#0ca678',
            'target-arrow-shape': 'triangle',
            'opacity': 0.7,
          }},
          { selector: "edge[relationship = 'IS_VOICE']", style: {
            'width': 2,
            'line-color': '#7048e8',
            'target-arrow-color': '#7048e8',
            'target-arrow-shape': 'triangle',
            'line-style': 'dotted',
            'opacity': 0.8,
          }},
          { selector: 'node.highlighted', style: {
            'border-width': 4,
            'border-color': '#f4a261',
            'width': 32,
            'height': 32,
            'shadow-blur': 12,
            'shadow-color': '#f4a261',
            'shadow-opacity': 0.5,
            'z-index': 999,
            'opacity': 1,
          }},
          { selector: 'node.dimmed', style: {
            'opacity': 0.15,
            'label': '',
          }},
          { selector: 'edge.dimmed', style: {
            'opacity': 0.1,
            'label': '',
          }},
          { selector: 'edge.highlighted', style: {
            'opacity': 0.8,
            'width': 3,
          }}
        ],
        layout: {
          name: 'cose',
          fit: true,
          padding: 30,
          animate: true,
          animationDuration: 500,
        }
      });
      console.log('Sundo: cytoscape initialized with', cy.nodes().length, 'total nodes');
      console.log('Sundo: article-class nodes:', cy.nodes('.article').length);
      console.log('Sundo: article-edge edges:', cy.edges('.article-edge').length);

      // Load legend counts from API
      fetch('/api/stats')
        .then(r => r.json())
        .then(function(stats) {
          if (stats.node_counts) {
            const nc = stats.node_counts;
            // Person (FARA-linked) — we need to count from graph data since API doesn't split by fara flag
            let personFara = 0, personUnlinked = 0, sourceCount = 0;
            graph.nodes.forEach(function(n) {
              if (n.data.type === 'Person') {
                if (n.data.fara_linked) personFara++;
                else personUnlinked++;
              }
              if (n.data.type === 'Source') sourceCount++;
            });
            document.getElementById('count-person-fara').textContent = '(' + personFara + ')';
            document.getElementById('count-person').textContent = '(' + personUnlinked + ')';
            document.getElementById('count-org').textContent = '(' + (nc['Organization'] || 0) + ')';
            document.getElementById('count-voice').textContent = '(' + (nc['PalestinianVoice'] || 0) + ')';
            document.getElementById('count-author').textContent = '(' + (nc['Author'] || 0) + ')';
            document.getElementById('count-source').textContent = '(' + sourceCount + ')';
          }
          if (stats.article_count !== undefined) {
            document.getElementById('count-article').textContent = '(' + stats.article_count + ')';
          }
        })
        .catch(function(err) {
          console.log('Sundo: stats fetch failed:', err);
        });

      // Safety: force-hide loading after 3s regardless
      setTimeout(function() {
        document.getElementById('loading').style.display = 'none';
      }, 3000);

      cy.on('mouseover', 'node', function(evt) {
        const n = evt.target;
        const info = document.getElementById('hover');
        const type = n.data('type');
        let extra = '';

        if (type === 'Author') {
          extra = '<br>Handle: @' + (n.data('handle') || n.id()) + '<br>Articles: ' + (n.data('article_count') || 0);
        } else if (type === 'Article') {
          const pub = n.data('published_at');
          const pubStr = pub ? new Date(pub).toLocaleDateString() : '—';
          extra = '<br>Published: ' + pubStr + '<br>Source: ' + (n.data('source_name') || '—');
        } else if (type === 'Source') {
          const cat = n.data('source_category');
          const catLabel = cat ? cat.toUpperCase() : '—';
          const catColor = cat === 'amplify' ? '#4e7e28' : '#b86d1a';
          extra = '<br>Type: ' + (n.data('source_type') || '—');
          if (cat) extra += '<br>Category: <span style="font-size:10px;background:' + catColor + ';color:#fff;padding:2px 6px;border-radius:4px;">' + catLabel + '</span>';
        } else if (type === 'Person') {
          extra = '<br>Platform: ' + (n.data('platform') || '—') + '<br>Followers: ' + ((n.data('follower_count') || 0).toLocaleString());
          const cs = n.data('credibility_score');
          if (cs !== null && cs !== undefined) extra += '<br>Credibility: ' + Number(cs).toFixed(2);
        } else if (type === 'PalestinianVoice') {
          extra = '<br>Platform: ' + (n.data('platform') || '—') + '<br>Reach: ' + Math.round((n.data('reach_score') || 0) * 100) + '%';
        }

        info.innerHTML = '<strong>' + (n.data('label') || n.id()) + '</strong><br>Type: ' + (type || 'Unknown') + extra;
      });

      cy.on('mouseout', 'node', function() {
        document.getElementById('hover').innerText = 'Hover a node for details.';
      });

      cy.on('layoutstop', function() {
        cy.fit(cy.elements(), 40);
      });

      // Layout switcher
      function runLayout(name) {
        const layoutOptions = {
          name: name,
          fit: true,
          padding: 30,
          animate: true,
          animationDuration: 500,
        };
        if (name === 'concentric') {
          layoutOptions.levelWidth = function() { return 1; };
          layoutOptions.concentric = function(n) {
            const type = n.data('type');
            if (type === 'Source') return 10;
            if (type === 'Person' || type === 'PalestinianVoice' || type === 'Organization' || type === 'Author') return 5;
            return 1;
          };
        }
        cy.layout(layoutOptions).run();
      }

      document.querySelectorAll('input[name="layout"]').forEach(function(radio) {
        radio.addEventListener('change', function(e) {
          if (e.target.checked) {
            console.log('Sundo: switching layout to', e.target.value);
            runLayout(e.target.value);
          }
        });
      });

      document.getElementById('show-articles').addEventListener('change', function(e) {
        console.log('Sundo: show-articles checkbox changed, checked=', e.target.checked);
        const show = e.target.checked;
        const articles = cy.nodes('.article');
        const edges = cy.edges('.article-edge');
        console.log('Sundo: found', articles.length, 'article nodes and', edges.length, 'article edges');
        if (show) {
          articles.show();
          edges.show();
          console.log('Sundo: showed articles');
        } else {
          articles.hide();
          edges.hide();
          console.log('Sundo: hid articles');
        }
        // Re-run selected layout after toggle so nodes recenter
        const selectedLayout = document.querySelector('input[name="layout"]:checked')?.value || 'cose';
        runLayout(selectedLayout);
      });

      document.getElementById('reset-view-btn').addEventListener('click', function() {
        cy.fit(cy.elements(':visible'), 40);
      });

      // Keyboard shortcut: R to reset view
      document.addEventListener('keydown', function(e) {
        if (e.key === 'r' || e.key === 'R') {
          // Don't trigger if user is typing in an input
          if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
          cy.fit(cy.elements(':visible'), 40);
        }
      });

      document.getElementById('toggle-authors').addEventListener('change', function(e) {
        const show = e.target.checked;
        toggleAuthorNodes(show);
      });

      function toggleAuthorNodes(show) {
        const authorNodes = cy.nodes("[type = 'Author']");
        if (show) {
          authorNodes.show();
          authorNodes.connectedEdges().show();
        } else {
          authorNodes.hide();
          authorNodes.connectedEdges().hide();
        }
        const selectedLayout = document.querySelector('input[name="layout"]:checked')?.value || 'cose';
        runLayout(selectedLayout);
      }

      // Sync initial checkbox state on load
      (function syncInitialState() {
        const checkbox = document.getElementById('show-articles');
        // Always hide articles on initial load
        checkbox.checked = false;
        cy.nodes('.article').hide();
        cy.edges('.article-edge').hide();
        const visible = cy.nodes(':visible');
        if (visible.length > 0) cy.fit(visible, 40);
        runLayout('cose');
      })();

      // ---- Click handlers + side panel ----
      cy.on('tap', 'node', function(evt) {
        const node = evt.target;
        const data = node.data();
        openPanel(data);
      });
      cy.on('tap', function(evt) {
        if (evt.target === cy) closePanel();
      });

      function openPanel(nodeData) {
        const panel = document.getElementById('detail-panel');
        const body = document.getElementById('panel-body');
        const title = document.getElementById('panel-title');
        body.innerHTML = '<div class="loading-state">Loading...</div>';
        panel.classList.add('panel-open');
        const type = nodeData.type;
        const id = nodeData.id;
        if (type === 'Person') {
          title.textContent = '@' + id;
          fetchPersonDetail(id);
        } else if (type === 'Organization') {
          title.textContent = nodeData.label || id;
          fetchOrgDetail(id);
        } else if (type === 'PalestinianVoice') {
          title.textContent = '@' + id;
          fetchVoiceDetail(id);
        } else if (type === 'Author') {
          title.textContent = nodeData.label || nodeData.id;
          fetchAuthorDetail(id);
        } else if (type === 'Source') {
          title.textContent = nodeData.label || id;
          fetchSourceDetail(id, nodeData.feed_url || '');
        } else if (type === 'Article') {
          title.textContent = nodeData.label || 'Article';
          renderArticlePanel(nodeData);
        } else {
          title.textContent = nodeData.label || 'Node';
          fetchOtherDetail(id);
        }
      }

      function closePanel() {
        document.getElementById('detail-panel').classList.remove('panel-open');
      }

      function fetchAuthorDetail(authorId) {
        fetch('/api/node/author/' + encodeURIComponent(authorId))
          .then(r => r.json())
          .then(d => renderAuthorPanel(d))
          .catch(() => {
            document.getElementById('panel-body').innerHTML =
              '<div class="loading-state">Could not load author data.</div>';
          });
      }

      function renderAuthorPanel(d) {
        let html = '';
        // Status badges
        html += '<div class="panel-section">';
        html += '<span class="badge badge-green">Author</span> ';
        if (d.primary_language === 'ar') {
          html += '<span class="badge badge-blue">Arabic</span> ';
        }
        if (d.linked_voice) {
          html += '<span class="badge" style="background:#ede9fe;color:#5f3dc4">' +
            'Voice matched</span>';
        }
        // Verification status badge
        const vStatus = d.verification_status || 'pending';
        let vBadgeClass = 'badge-gray';
        if (vStatus === 'verified') vBadgeClass = 'badge-green';
        if (vStatus === 'suspicious') vBadgeClass = 'badge-red';
        html += '<span class="badge ' + vBadgeClass + '">' +
          vStatus.charAt(0).toUpperCase() + vStatus.slice(1) + '</span>';
        html += '</div>';

        // Core stats
        html += '<div class="panel-section">';
        html += '<div class="panel-section-title">Author</div>';
        html += row('Handle', d.handle || '—');
        html += row('Language', d.primary_language || 'en');
        html += row('Articles tracked', (d.article_count || 0).toString());
        html += row('First seen', fmtDate(d.first_seen));
        html += row('Last seen', fmtDate(d.last_seen));
        html += '</div>';

        // Byline variants
        if (d.byline_variants && d.byline_variants.length > 1) {
          html += '<div class="panel-section">';
          html += '<div class="panel-section-title">Byline variants</div>';
          const variants = typeof d.byline_variants === 'string'
            ? JSON.parse(d.byline_variants)
            : d.byline_variants;
          variants.forEach(function(v) {
            html += '<div style="padding:2px 0;font-size:12px">' + v + '</div>';
          });
          html += '</div>';
        }

        // Publications
        if (d.publications && d.publications.length > 0) {
          html += '<div class="panel-section">';
          html += '<div class="panel-section-title">Writes for</div>';
          d.publications.forEach(function(p) {
            html += '<div class="article-item">';
            html += '<strong>' + p.name + '</strong>';
            html += '<div class="article-meta">' + p.article_count + ' articles</div>';
            html += '</div>';
          });
          html += '</div>';
        }

        // Linked Palestinian Voice
        if (d.linked_voice) {
          html += '<div class="panel-section">';
          html += '<div class="panel-section-title">Linked voice</div>';
          html += '<div class="article-item">';
          html += '@' + d.linked_voice.handle;
          const reachPct = Math.round((d.linked_voice.reach_score || 0) * 100);
          html += '<div class="article-meta">Reach score: ' + reachPct + '% · ';
          html += d.linked_voice.verification_status + '</div>';
          html += '</div></div>';
        }

        // Recent articles
        if (d.articles && d.articles.length > 0) {
          html += '<div class="panel-section">';
          html += '<div class="panel-section-title">Recent articles</div>';
          d.articles.forEach(function(a) {
            html += '<div class="article-item">';
            html += '<a href="' + a.url + '" target="_blank">' + (a.title || 'Untitled') + '</a>';
            html += '<div class="article-meta">' + (a.source_name || '') + ' · ';
            html += fmtDate(a.published_at) + '</div>';
            html += '</div>';
          });
          html += '</div>';
        }

        document.getElementById('panel-body').innerHTML = html;
      }

      function fetchPersonDetail(handle) {
        fetch('/api/node/person/' + encodeURIComponent(handle))
          .then(r => r.json())
          .then(d => renderPersonPanel(d))
          .catch(() => {
            document.getElementById('panel-body').innerHTML =
              '<div class="loading-state">Could not load node data.</div>';
          });
      }

        html += '<div class="panel-section">';
        html += faraLinked
          ? '<span class="badge badge-red">FARA-linked</span> '
          : '<span class="badge badge-gray">No FARA link found</span> ';
        if (d.verified) html += '<span class="badge badge-blue">Verified account</span>';
        html += '</div>';
        html += '<div class="panel-section">';
        html += '<div class="panel-section-title">Account</div>';
        html += row('Platform', d.platform || '—');
        html += row('Followers', (d.follower_count || 0).toLocaleString());
        html += row('First seen', fmtDate(d.first_seen));
        html += row('Last seen', fmtDate(d.last_seen));
        html += '</div>';
        html += '<div class="panel-section">';
        html += '<div class="panel-section-title">Coordination suspicion</div>';
        html += '<div>' + scorePct + '%</div>';
        html += '<div class="score-bar"><div class="score-bar-fill" style="width:' + scorePct + '%"></div></div>';
        html += '</div>';
        if (d.funding && d.funding.length > 0) {
          html += '<div class="panel-section">';
          html += '<div class="panel-section-title">Documented payments</div>';
          d.funding.forEach(function(f) {
            html += '<div class="article-item">';
            html += '<strong>' + f.org_name + '</strong>';
            if (f.amount_usd) html += ' — $' + f.amount_usd.toLocaleString();
            if (f.period) html += ' (' + f.period + ')';
            html += '<div class="article-meta">' + (f.filing_source || '').toUpperCase();
            if (f.evidence_url) html += ' · <a href="' + f.evidence_url + '" target="_blank">Source →</a>';
            html += '</div></div>';
          });
          html += '</div>';
        }
        if (d.coordination_events && d.coordination_events.length > 0) {
          html += '<div class="panel-section">';
          html += '<div class="panel-section-title">Coordination events (' + d.coordination_events.length + ')</div>';
          d.coordination_events.slice(0, 5).forEach(function(e) {
            html += '<div class="article-item">';
            html += '<span class="badge badge-orange">' + (e.trigger_type || '').replace('_', ' ') + '</span> ';
            html += (e.account_count || 0) + ' accounts';
            if (e.hashtags && e.hashtags.length) html += ' · ' + e.hashtags.slice(0,2).join(' ');
            html += '<div class="article-meta">' + fmtDate(e.detected_at) + '</div>';
            html += '</div>';
          });
          html += '</div>';
        }
        if (d.ftc_violations && d.ftc_violations.length > 0) {
          html += '<div class="panel-section">';
          html += '<div class="panel-section-title">FTC violation candidates</div>';
          d.ftc_violations.forEach(function(v) {
            html += '<div class="article-item">';
            if (v.amount_usd) html += '$' + v.amount_usd.toLocaleString() + ' undisclosed · ';
            html += '<a href="' + v.post_url + '" target="_blank">View post →</a>';
            html += '<div class="article-meta">' + fmtDate(v.flagged_at) + '</div>';
            html += '<div style="margin-top:6px">';
            html += '<button class="action-btn primary" onclick="openFtcPackage(\'' + v.package_path + '\')">';
            html += 'Review complaint package</button>';
            html += '</div></div>';
          });
          html += '</div>';
        }
        if (d.recent_posts && d.recent_posts.length > 0) {
          html += '<div class="panel-section">';
          html += '<div class="panel-section-title">Recent posts</div>';
          d.recent_posts.slice(0, 5).forEach(function(p) {
            html += '<div class="article-item">';
            html += '<div>' + (p.content_preview || '') + '</div>';
            html += '<div class="article-meta">' + (p.platform || '') + ' · ' + fmtDate(p.timestamp);
            if (!p.disclosed_sponsored) html += ' · <span style="color:#c94c4c">No disclosure</span>';
            html += '</div></div>';
          });
          html += '</div>';
        }
        document.getElementById('panel-body').innerHTML = html;
      }

      function fetchOrgDetail(orgId) {

        html += '<div class="panel-section">';

        html += row('Country', d.country || '—');
        html += row('Type', d.org_type || '—');
        html += '</div>';
        if (d.irs990 && d.irs990.revenue) {
          html += '<div class="panel-section">';
          html += '<div class="panel-section-title">IRS 990 (most recent)</div>';
          html += row('Revenue', '$' + d.irs990.revenue.toLocaleString());
          html += row('Expenses', '$' + d.irs990.expenses.toLocaleString());

        html += row('Total tracked', '$' + (d.total_disbursements_tracked || 0).toLocaleString());
        if (d.funded_persons && d.funded_persons.length > 0) {
          d.funded_persons.slice(0, 8).forEach(function(p) {
            html += '<div class="article-item">';
            html += '<strong>@' + p.handle + '</strong> (' + (p.platform || '') + ')';
            if (p.amount_usd) html += ' — $' + p.amount_usd.toLocaleString();
            html += '<div class="article-meta">' + (p.follower_count || 0).toLocaleString() + ' followers</div>';
            html += '</div>';

            html += '<div class="article-meta">+' + (d.funded_persons.length - 8) + ' more</div>';

        html += '</div>';
        document.getElementById('panel-body').innerHTML = html;

        fetch('/api/node/voice/' + encodeURIComponent(handle))
          .then(r => r.json())
          .then(d => renderVoicePanel(d))
          .catch(() => {
            document.getElementById('panel-body').innerHTML =
              '<div class="loading-state">Could not load node data.</div>';
          });

          : '<span class="badge badge-orange">Pending verification</span> ';

        html += '</div>';
        html += '<div class="panel-section">';
        html += '<div class="panel-section-title">Voice</div>';
        html += row('Platform', d.platform || '—');
        html += row('Language', d.language || '—');
        html += row('Last active', fmtDate(d.last_active));
        if (d.content_focus && d.content_focus.length) {
          html += row('Focus', d.content_focus.join(', '));
        }
        html += '</div>';
        const reachPct = Math.round((d.reach_score || 0) * 100);
        html += '<div class="panel-section">';
        html += '<div class="panel-section-title">Reach score</div>';
        html += '<div>' + reachPct + '%</div>';
        html += '<div class="score-bar"><div class="score-bar-fill green" style="width:' + reachPct + '%"></div></div>';
        html += '</div>';
        if (d.recent_articles && d.recent_articles.length > 0) {
          html += '<div class="panel-section">';
          html += '<div class="panel-section-title">Recent articles</div>';
          d.recent_articles.forEach(function(a) {
            html += '<div class="article-item">';
            html += '<a href="' + a.url + '" target="_blank">' + (a.title || 'Untitled') + '</a>';
            html += '<div class="article-meta">' + (a.source_name || '') + ' · ' + fmtDate(a.published_at) + '</div>';

          html += '</div>';

        html += '<div class="panel-section">';

          .then(r => r.json())
          .then(d => renderSourcePanel(d))
          .catch(() => {

              '<div class="loading-state">Could not load source data.</div>';
          });

        html += '<span class="badge ' + catColor + '">' + (d.source_category === 'amplify' ? 'Amplify' : 'Monitor') + '</span> ';

        html += '</div>';
        html += '<div class="panel-section">';
        html += '<div class="panel-section-title">Source Info</div>';
        html += row('Feed URL', d.feed_url || '—');
        html += row('Type', d.source_type || '—');
        html += row('Category', d.source_category ? d.source_category.charAt(0).toUpperCase() + d.source_category.slice(1) : '—');
        html += row('Articles', (d.article_count || 0).toString());
        html += '</div>';
        html += '<div class="panel-section">';
        html += '<div class="panel-section-title">Articles</div>';

          d.articles.forEach(function(a) {

      function renderArticlePanel(d) {
        let html = '';
        html += '<div class="panel-section">';
        html += '<span class="badge badge-gray">Article</span> ';
        if (d.source_type) {
          const typeColor = d.source_type === 'amplify' ? 'badge-green' : 'badge-gray';
          html += '<span class="badge ' + typeColor + '">' + (d.source_type === 'amplify' ? 'Amplify' : 'Monitor') + '</span> ';

        html += '<div class="panel-section">';
        html += '<div class="panel-section-title">Article</div>';

          html += '<div style="font-weight:500;margin-bottom:8px;line-height:1.4"><a href="' + (d.article_link || d.url) + '" target="_blank" style="color:#2e6b9e;text-decoration:none;">' + (d.title || 'Untitled') + '</a></div>';
        } else {
          html += '<div style="font-weight:500;margin-bottom:8px;line-height:1.4">' + (d.title || 'Untitled') + '</div>';
        }
        html += row('Source', d.source_name || '—');
        html += row('Published', fmtDate(d.published_at));

          const authors = Array.isArray(d.authors) ? d.authors.join(', ') : d.authors;
          html += row('Authors', authors);
        }

          const tags = Array.isArray(d.tags) ? d.tags.join(', ') : d.tags;
          html += row('Tags', tags);

          .then(r => r.json())
          .then(d => renderOtherPanel(d))
          .catch(() => {
            document.getElementById('panel-body').innerHTML =
              '<div class="loading-state">Could not load node data.</div>';
          });

      // ---- Action handlers ----
      function toggleDigest(handle, btn) {
        fetch('/api/action/digest-include/' + encodeURIComponent(handle), { method: 'POST' })
          .then(r => r.json())
          .then(function(d) {
            btn.textContent = d.digest_include ? 'Remove from digest' : 'Add to digest';
          });
      }

      function openFtcPackage(packagePath) {
        fetch('/api/action/ftc-open/' + encodeURIComponent(packagePath))
          .then(r => r.json())
          .then(function(d) {
            const win = window.open('', '_blank');
            win.document.write('<pre style="font-family:monospace;padding:20px;white-space:pre-wrap">' + d.content + '<' + '/pre>');
            win.document.write('<p><a href="' + d.submit_url + '" target="_blank">Submit to FTC →</a></p>');
          });
      }

      function copyAmpPack(handle) {
        fetch('/api/node/voice/' + encodeURIComponent(handle))
          .then(r => r.json())
          .then(function(d) {
            const articles = (d.recent_articles || []).slice(0, 3)
              .map(function(a) { return '- ' + a.title + '\n ' + a.url; })
              .join('\n');
            const pack = '@' + handle + ' (' + (d.platform || '') + ') — reach score ' + Math.round((d.reach_score||0)*100) + '%\n\nRecent:\n' + articles;
            navigator.clipboard.writeText(pack);
            alert('Amplification pack copied to clipboard');
          });
      }

      // ---- Utilities ----
      function row(label, value) {
        return '<div class="panel-row"><span class="panel-row-label">' + label + '</span><span class="panel-row-value">' + (value || '—') + '</span></div>';
      }

      function fmtDate(iso) {
        if (!iso) return '—';
        const d = new Date(iso);
        if (isNaN(d)) return iso;
        const now = new Date();
        const diff = Math.floor((now - d) / 1000);
        if (diff < 60) return 'just now';
        if (diff < 3600) return Math.floor(diff/60) + 'm ago';
        if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
        if (diff < 604800) return Math.floor(diff/86400) + 'd ago';
        return d.toLocaleDateString();
      }

      // ---- Search ----
      (function initSearch() {
        const searchInput = document.getElementById('search-input');
        const searchDropdown = document.getElementById('search-dropdown');
        let searchTimeout = null;
        let selectedIndex = -1;
        let currentResults = [];
        let activeSearchIds = new Set();
        let isSearchActive = false;

        function clearGraphFilter() {
          if (!isSearchActive) return;
          cy.nodes().forEach(function(node) {
            node.style('opacity', 1);
            node.style('border-width', 2);
            node.style('border-color', '#6b5e4f');
          });
          cy.edges().forEach(function(edge) {
            edge.style('opacity', 1);
          });
          isSearchActive = false;
          activeSearchIds.clear();
        }

        function applyGraphFilter(results) {
          clearGraphFilter();
          if (!results || results.length === 0) {
            isSearchActive = true;
            cy.nodes().forEach(function(node) {
              node.style('opacity', 0.2);
            });
            cy.edges().forEach(function(edge) {
              edge.style('opacity', 0.1);
            });
            return;
          }

          // Collect IDs that exist in the graph
          const matchingIds = new Set();
          for (const r of results) {
            const node = cy.getElementById(r.id);
            if (node && node.length > 0) {
              matchingIds.add(r.id);
            }
          }

          if (matchingIds.size === 0) {
            isSearchActive = true;
            cy.nodes().forEach(function(node) {
              node.style('opacity', 0.2);
            });
            cy.edges().forEach(function(edge) {
              edge.style('opacity', 0.1);
            });
            activeSearchIds.clear();
            return;
          }

          isSearchActive = true;
          activeSearchIds = matchingIds;

          // Apply styles directly
          cy.nodes().forEach(function(node) {
            if (matchingIds.has(node.id())) {
              node.style('opacity', 1);
              node.style('border-width', 4);
              node.style('border-color', '#ff6b35');
            } else {
              node.style('opacity', 0.2);
              node.style('border-width', 2);
              node.style('border-color', '#6b5e4f');
            }
          });

          cy.edges().forEach(function(edge) {
            const src = edge.source().id();
            const tgt = edge.target().id();
            if (matchingIds.has(src) || matchingIds.has(tgt)) {
              edge.style('opacity', 0.6);
            } else {
              edge.style('opacity', 0.05);
            }
          });
        }

        function zoomToFirstMatch(results) {
          for (const r of results) {
            const node = cy.getElementById(r.id);
            if (node && node.length > 0) {
              cy.fit(node, 60);
              // Flash the node
              node.animate({ style: { 'border-width': 8, 'border-color': '#ff6b35' } }, { duration: 300 });
              setTimeout(function() {
                node.animate({ style: { 'border-width': 4, 'border-color': '#f4a261' } }, { duration: 300 });
              }, 600);
              return true;
            }
          }
          return false;
        }

        function clearDropdown() {
          searchDropdown.innerHTML = '';
          searchDropdown.classList.remove('active');
          selectedIndex = -1;
          currentResults = [];
        }

        function renderResults(results) {
          currentResults = results;
          selectedIndex = -1;
          if (results.length === 0) {
            searchDropdown.innerHTML = '<div class="search-no-results">No results found</div>';
            searchDropdown.classList.add('active');
            return;
          }
          let html = '';
          results.forEach(function(r, i) {
            const typeClass = 'search-type-' + r.type.toLowerCase();
            html += '<div class="search-result" data-index="' + i + '" data-type="' + r.type + '" data-id="' + r.id + '">';
            html += '<span class="search-result-type ' + typeClass + '">' + r.type + '</span>';
            html += '<span class="search-result-title">' + escapeHtml(r.title) + '</span>';
            if (r.subtitle) {
              html += '<div class="search-result-subtitle">' + escapeHtml(r.subtitle) + '</div>';
            }
            html += '</div>';
          });
          searchDropdown.innerHTML = html;
          searchDropdown.classList.add('active');

          // Click handlers
          searchDropdown.querySelectorAll('.search-result').forEach(function(el) {
            el.addEventListener('click', function() {
              const type = el.getAttribute('data-type');
              const id = el.getAttribute('data-id');
              navigateToResult(type, id);
              clearDropdown();
              searchInput.value = '';
              clearGraphFilter();
            });
          });
        }

        function escapeHtml(text) {
          if (!text) return '';
          const div = document.createElement('div');
          div.textContent = text;
          return div.innerHTML;
        }

        function navigateToResult(type, id) {
          // Find the node in cytoscape
          const node = cy.getElementById(id);
          if (node && node.length > 0) {
            cy.fit(node, 60);
            // Flash the node
            node.animate({ style: { 'border-width': 6, 'border-color': '#f4a261' } }, { duration: 300 });
            setTimeout(function() {
              node.animate({ style: { 'border-width': 2, 'border-color': '#6b5e4f' } }, { duration: 300 });
            }, 600);
            openPanel(node.data());
          } else {
            console.warn('Sundo search: node not found in graph:', id);
            // Open panel and fetch details via API
            const panel = document.getElementById('detail-panel');
            const title = document.getElementById('panel-title');
            document.getElementById('panel-body').innerHTML = '<div class="loading-state">Loading...</div>';
            panel.classList.add('panel-open');
            if (type === 'Article' || type === 'Other') {
              title.textContent = 'Article';
              fetchOtherDetail(id);
            } else if (type === 'Author') {
              title.textContent = 'Author';
              fetchAuthorDetail(id);
            } else if (type === 'Source') {
              title.textContent = 'Source';
              fetchSourceDetail(id, '');
            } else {
              title.textContent = 'Node';
              fetchOtherDetail(id);
            }
          }
        }

        function updateSelection() {
          const items = searchDropdown.querySelectorAll('.search-result');
          items.forEach(function(el, i) {
            if (i === selectedIndex) {
              el.classList.add('selected');
              el.scrollIntoView({ block: 'nearest' });
            } else {
              el.classList.remove('selected');
            }
          });
        }

        function doSearch(query) {
          if (!query || query.length < 2) {
            clearDropdown();
            clearGraphFilter();
            return;
          }
          fetch('/api/search?q=' + encodeURIComponent(query))
            .then(function(r) { return r.json(); })
            .then(function(data) {
              const results = data.results || [];
              renderResults(results);
              applyGraphFilter(results);
            })
            .catch(function(err) {
              console.error('Sundo search error:', err);
            });
        }

        searchInput.addEventListener('input', function(e) {
          if (searchTimeout) clearTimeout(searchTimeout);
          const query = e.target.value.trim();
          if (!query || query.length < 2) {
            clearDropdown();
            clearGraphFilter();
            return;
          }
          searchTimeout = setTimeout(function() {
            doSearch(query);
          }, 300);
        });

        searchInput.addEventListener('keydown', function(e) {
          const items = searchDropdown.querySelectorAll('.search-result');
          if (!searchDropdown.classList.contains('active')) {
            // If dropdown is not active but we have a query, handle Enter and Escape
            if (e.key === 'Enter') {
              e.preventDefault();
              doSearch(searchInput.value.trim());
              if (isSearchActive && activeSearchIds.size > 0) {
                zoomToFirstMatch(currentResults);
              }
            } else if (e.key === 'Escape') {
              clearDropdown();
              clearGraphFilter();
              searchInput.value = '';
              searchInput.blur();
            }
            return;
          }
          if (e.key === 'ArrowDown') {
            e.preventDefault();
            selectedIndex = (selectedIndex + 1) % items.length;
            updateSelection();
          } else if (e.key === 'ArrowUp') {
            e.preventDefault();
            selectedIndex = (selectedIndex - 1 + items.length) % items.length;
            updateSelection();
          } else if (e.key === 'Enter') {
            e.preventDefault();
            if (selectedIndex >= 0 && selectedIndex < items.length) {
              const el = items[selectedIndex];
              const type = el.getAttribute('data-type');
              const id = el.getAttribute('data-id');
              navigateToResult(type, id);
              clearDropdown();
              searchInput.value = '';
              clearGraphFilter();
            } else {
              // No selection — zoom to first matching graph node
              zoomToFirstMatch(currentResults);
            }
          } else if (e.key === 'Escape') {
            clearDropdown();
            clearGraphFilter();
            searchInput.value = '';
            searchInput.blur();
          }
        });

        // Close dropdown when clicking outside
        document.addEventListener('click', function(e) {
          if (!searchInput.contains(e.target) && !searchDropdown.contains(e.target)) {
            clearDropdown();
          }
        });
      })();

      // ---- Filter handlers ----
      document.getElementById('apply-filters').addEventListener('click', function() {
        const days = document.getElementById('filter-date').value;
        const source = document.getElementById('filter-source').value;
        const tag = document.getElementById('filter-tag').value.trim();
        
        const params = new URLSearchParams();
        if (days !== 'all') params.append('days', days);
        if (source !== 'all') params.append('sources', source);
        if (tag) params.append('tags', tag);
        
        const url = '/api/filter?' + params.toString();
        
        fetch(url)
          .then(function(r) { return r.json(); })
          .then(function(data) {
            if (data.error) {
              console.error('Filter error:', data.error);
              return;
            }
            
            // Replace graph elements
            cy.elements().remove();
            cy.add(data.nodes.map(function(n) {
              const el = { data: n.data };
              if (n.data.type === 'Article') el.classes = 'article';
              return el;
            }));
            cy.add(data.edges.map(function(e) {
              const el = { data: e.data };
              if (e.data.relationship === 'PUBLISHED') el.classes = 'article-edge';
              return el;
            }));
            
            // Apply visibility based on checkboxes
            if (!document.getElementById('show-articles').checked) {
              cy.nodes('.article').hide();
              cy.edges('.article-edge').hide();
            }
            
            // Re-run layout
            const selectedLayout = document.querySelector('input[name="layout"]:checked').value;
            runLayout(selectedLayout);
            
            // Update counts
            updateCounts();
            
            console.log('Filter applied:', data.article_count, 'articles shown');
          })
          .catch(function(err) {
            console.error('Filter fetch failed:', err);
          });
      });
      
      document.getElementById('clear-filters').addEventListener('click', function() {
        document.getElementById('filter-date').value = 'all';
        document.getElementById('filter-source').value = 'all';
        document.getElementById('filter-tag').value = '';
        
        // Reload original graph
        cy.elements().remove();
        cy.add(graph.nodes.map(function(n) {
          const el = { data: n.data };
          if (n.data.type === 'Article') el.classes = 'article';
          return el;
        }));
        cy.add(graph.edges.map(function(e) {
          const el = { data: e.data };
          if (e.data.relationship === 'PUBLISHED') el.classes = 'article-edge';
          return el;
        }));
        
        // Apply visibility
        if (!document.getElementById('show-articles').checked) {
          cy.nodes('.article').hide();
          cy.edges('.article-edge').hide();
        }
        
        const selectedLayout = document.querySelector('input[name="layout"]:checked').value;
        runLayout(selectedLayout);
        updateCounts();
        
        console.log('Filters cleared');
      });

    } catch (err) {
      document.getElementById('loading').innerHTML = '<span style="color:#c94c4c">Error: ' + err.message + '</span>';
      console.error('Dashboard error:', err);
    }
  </script>
</body>
