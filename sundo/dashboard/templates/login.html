<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>☀️ Sundo Pi — Login</title>
  <link rel="icon" type="image/png" href="/static/favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: system-ui, -apple-system, sans-serif;
      background: #faf8f3;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-box {
      background: #f5f0e6;
      padding: 36px;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(74, 124, 89, 0.12);
      width: 100%;
      max-width: 380px;
      box-sizing: border-box;
      border: 1px solid #e8dcc8;
    }
    .login-header {
      text-align: center;
      margin-bottom: 24px;
    }
    .sun-icon {
      font-size: 32px;
      margin-bottom: 8px;
    }
    .login-box h1 {
      margin: 0;
      font-size: 20px;
      color: #3d3229;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .login-subtitle {
      font-size: 12px;
      color: #8a7b6b;
      margin-top: 6px;
    }
    .form-group {
      margin-bottom: 18px;
    }
    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #5a4e42;
      margin-bottom: 6px;
    }
    .form-group input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #d4c5a9;
      border-radius: 10px;
      font-size: 14px;
      box-sizing: border-box;
      font-family: inherit;
      background: #faf8f3;
      color: #3d3229;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-group input:focus {
      outline: none;
      border-color: #4a7c59;
      box-shadow: 0 0 0 3px rgba(74, 124, 89, 0.15);
    }
    .error {
      background: #fff0e0;
      color: #b55a00;
      padding: 11px 14px;
      border-radius: 10px;
      font-size: 13px;
      margin-bottom: 18px;
      border: 1px solid #f4d4a0;
    }
    button[type="submit"] {
      width: 100%;
      padding: 13px;
      background: #4a7c59;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.2s, transform 0.1s;
    }
    button[type="submit"]:hover {
      background: #5a9c6b;
    }
    button[type="submit"]:active {
      transform: scale(0.98);
    }
    .back-link {
      display: block;
      text-align: center;
      margin-top: 18px;
      font-size: 13px;
      color: #4a7c59;
      text-decoration: none;
      transition: color 0.2s;
    }
    .back-link:hover {
      color: #5a9c6b;
      text-decoration: underline;
    }
    @media (prefers-color-scheme: dark) {
      html, body { background: #1a2f1a; }
      .login-box { background: #243d24; border-color: #3d5c3d; }
      .login-box h1 { color: #e8dcc8; }
      .login-subtitle { color: #a8b89a; }
      .form-group label { color: #c4b8a8; }
      .form-group input { background: #1a2f1a; border-color: #4a6b4a; color: #e8dcc8; }
      .form-group input:focus { border-color: #7cb342; }
      .error { background: #3d2a1a; color: #f4c078; border-color: #5a3d28; }
      button[type="submit"] { background: #5a9c6b; }
      button[type="submit"]:hover { background: #7cb342; }
      .back-link { color: #8fbc8f; }
    }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="login-header">
      <div class="sun-icon">☀️</div>
      <h1>Sundo Pi Dashboard</h1>
      <div class="login-subtitle">Investigate · Amplify · Protect</div>
    </div>
    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}
    <form method="POST" action="/login">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required autofocus>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required>
      </div>
      <button type="submit">🌿 Sign in</button>
    </form>
    <a class="back-link" href="/">← Back to dashboard</a>
  </div>
</body>
</html>
